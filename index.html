<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --basalt-dark: #0a0a0b;
            --basalt-mid: #1a1b1e;
            --basalt-light: #2c2e33;
            --accent-glow: rgba(255, 255, 255, 0.05);
            --strat-shadow: 0 10px 30px -5px rgba(0,0,0,0.9);
            --folder-color: #242529;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--basalt-dark);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Granular Texture Overlay */
        .basalt-surface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.4;
            filter: contrast(150%) brightness(80%);
        }

        /* The Stratification Grid */
        .workspace {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 60px;
            padding: 80px;
            perspective: 1200px;
            z-index: 2;
        }

        /* Skeuomorphic Folder */
        .folder-container {
            position: relative;
            width: 240px;
            height: 180px;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .folder-container:hover {
            transform: translateY(-12px) rotateX(10deg) rotateY(-5deg);
        }

        /* Stratified Layers */
        .folder-back {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90%;
            background: var(--folder-color);
            border-radius: 4px 12px 4px 4px;
            box-shadow: 
                var(--strat-shadow),
                inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .folder-tab {
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 30px;
            background: var(--folder-color);
            border-radius: 8px 12px 0 0;
            clip-path: polygon(0 0, 85% 0, 100% 100%, 0% 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.08);
        }

        .folder-front {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 85%;
            background: #2a2c31;
            border-radius: 2px 4px 4px 4px;
            transform-origin: bottom;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-shadow: 
                -2px 0 10px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(0,0,0,0.3);
        }

        .folder-container:hover .folder-front {
            transform: rotateX(-25deg);
        }

        /* Typography */
        .folder-label {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: #f0f0f0;
            margin-bottom: 4px;
        }

        .folder-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }

        /* Pretext-optimized Content Preview */
        .content-peek {
            position: absolute;
            top: 20px;
            left: 15px;
            right: 15px;
            height: 100px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .folder-container:hover .content-peek {
            opacity: 1;
            transform: translateY(0);
        }

        .peek-line {
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 6px;
            width: 100%;
        }

        /* SVG Grain Filter */
        .svg-filter-hidden {
            position: absolute;
            width: 0;
            height: 0;
            visibility: hidden;
        }

        .strata-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 50% 50%, rgba(30, 31, 35, 0.8) 0%, rgba(10, 10, 11, 1) 100%),
                repeating-linear-gradient(45deg, transparent 0, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
            z-index: 1;
        }

        /* Negative space branding */
        .header-slug {
            position: fixed;
            top: 40px;
            left: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #444;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        .coordinates {
            position: fixed;
            bottom: 40px;
            right: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #444;
            text-align: right;
        }

    </style>
</head>
<body>

    <svg class="svg-filter-hidden">
        <filter id="basalt-grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
            <feComponentTransfer>
                <feFuncR type="linear" slope="0.2" />
                <feFuncG type="linear" slope="0.2" />
                <feFuncB type="linear" slope="0.2" />
            </feComponentTransfer>
        </filter>
    </svg>

    <div class="basalt-surface" style="filter: url(#basalt-grain);"></div>
    <div class="strata-bg"></div>

    <div class="header-slug">Basaltic / Stratum V.01</div>

    <main class="workspace">
        
        <!-- Folder 1 -->
        <div class="folder-container" style="transition-delay: 0.1s;">
            <div class="folder-tab"></div>
            <div class="folder-back">
                <div class="content-peek">
                    <div class="peek-line" style="width: 40%"></div>
                    <div class="peek-line" style="width: 80%"></div>
                    <div class="peek-line" style="width: 60%"></div>
                </div>
            </div>
            <div class="folder-front">
                <div class="folder-label">Obsidian_Core</div>
                <div class="folder-meta">Layer 01 // 1.2GB</div>
            </div>
        </div>

        <!-- Folder 2 -->
        <div class="folder-container" style="transition-delay: 0.2s;">
            <div class="folder-tab"></div>
            <div class="folder-back">
                <div class="content-peek">
                    <div class="peek-line" style="width: 90%"></div>
                    <div class="peek-line" style="width: 30%"></div>
                    <div class="peek-line" style="width: 50%"></div>
                </div>
            </div>
            <div class="folder-front">
                <div class="folder-label">Lithic_Data</div>
                <div class="folder-meta">Layer 02 // 844MB</div>
            </div>
        </div>

        <!-- Folder 3 -->
        <div class="folder-container" style="transition-delay: 0.3s;">
            <div class="folder-tab"></div>
            <div class="folder-back">
                <div class="content-peek">
                    <div class="peek-line" style="width: 20%"></div>
                    <div class="peek-line" style="width: 70%"></div>
                    <div class="peek-line" style="width: 40%"></div>
                </div>
            </div>
            <div class="folder-front">
                <div class="folder-label">Tectonic_Ref</div>
                <div class="folder-meta">Layer 03 // 4.1GB</div>
            </div>
        </div>

    </main>

    <div class="coordinates">
        LAT: 64.1265° N<br>
        LNG: 21.8174° W
    </div>

    <script>
        // Subtle mouse interaction to shift the perspective grid
        const workspace = document.querySelector('.workspace');
        
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            workspace.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // Entrance animation
        document.querySelectorAll('.folder-container').forEach((el, i) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(40px) scale(0.9)';
            
            setTimeout(() => {
                el.style.transition = 'all 0.8s cubic-bezier(0.2, 0, 0.2, 1)';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0) scale(1)';
            }, 200 + (i * 150));
        });
    </script>
</body>
</html>
