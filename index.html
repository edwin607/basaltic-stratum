<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Youth';
            src: url('Youth-Bold.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
        }
        :root {
            --basalt-dark: #0a0a0b;
            --basalt-mid: #1a1b1e;
            --basalt-light: #2c2e33;
            --accent-glow: rgba(255, 255, 255, 0.05);
            --strat-shadow: 0 10px 30px -5px rgba(0,0,0,0.9);
            --folder-color: #242529;
            --accent-purple: #9065b0;
            --accent-teal: #4496c1;
            --accent-orange: #f37523;
            --accent-gold: #f9a44f;
            --text-secondary: #666666;
            --bg-warm: #e9dcd2;
            --bg-light: #f8f6f3;
            --layer-glow: rgba(144, 101, 176, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #0a0a0b;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Granular Texture Overlay */
        .basalt-surface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.35;
            filter: contrast(120%) brightness(90%);
        }

        /* The Stratification Grid - Horizontal Row Layout */
        .workspace {
            position: relative;
            display: flex;
            flex-direction: row;
            gap: 60px;
            padding: 120px 80px;
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            height: 100%;
            align-items: center;
            perspective: 1200px;
            z-index: 2;
        }

        /* Skeuomorphic Folder */
        .folder-container {
            position: relative;
            width: 240px;
            height: 180px;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .folder-container:hover {
            transform: translateY(-12px) rotateX(10deg) rotateY(-5deg);
        }

        .folder-container:hover .folder-back {
            box-shadow: 
                0 10px 30px -5px rgba(0,0,0,0.9),
                0 16px -4px rgba(16, 24, 40, 0.08),
                0 0 20px var(--layer-glow),
                inset 0 1px 1px rgba(255,255,255,0.15);
        }

        /* Stratified Layers */
        .folder-back {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90%;
            background: var(--folder-color);
            border-radius: 4px 12px 4px 4px;
            box-shadow: 
                0 10px 30px -5px rgba(0,0,0,0.9),
                0 16px -4px rgba(16, 24, 40, 0.08),
                inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .folder-tab {
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 30px;
            background: var(--folder-color);
            border-radius: 8px 12px 0 0;
            clip-path: polygon(0 0, 85% 0, 100% 100%, 0% 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.08);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .folder-container:hover .folder-tab {
            background: var(--accent-purple);
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.15),
                0 0 12px var(--layer-glow);
        }

        .folder-front {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 85%;
            background: linear-gradient(160deg, #2a2c31 0%, #242529 60%, #1f2049 100%);
            border-radius: 2px 4px 4px 4px;
            transform-origin: bottom;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, background 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-shadow: 
                -2px 0 12px rgba(0,0,0,0.6),
                0 8px -2px rgba(16, 24, 40, 0.05),
                inset 0 1px 0 rgba(255,255,255,0.08);
            border: 1px solid rgba(31, 32, 73, 0.5);
        }

        .folder-container:hover .folder-front {
            transform: rotateX(-25deg);
            background: linear-gradient(160deg, #2a2c31 0%, #242529 40%, #1f2049 100%);
            box-shadow: 
                -2px 0 12px rgba(0,0,0,0.6),
                0 8px -2px rgba(16, 24, 40, 0.05),
                0 0 20px var(--layer-glow),
                inset 0 1px 0 rgba(255,255,255,0.1);
            border-color: var(--accent-purple);
        }

        /* Typography */
        .folder-label {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: #f0f0f0;
            margin-bottom: 4px;
            transition: color 0.3s ease;
            white-space: nowrap;
        }

        .folder-label-img {
            width: 100%;
            max-width: 180px;
            height: auto;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .folder-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .folder-container:hover .folder-label {
            color: var(--accent-teal);
        }

        /* Layer_1 Large - Input style */
        .layer1-large {
            width: 334px;
            height: 70px;
        }

        .layer1-large .folder-front {
            height: 70px;
            border-radius: 4px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #f8f6f3 0%, #e9dcd2 100%);
            border: 1px solid #e508ff;
            position: relative;
            overflow: hidden;
        }

        .layer1-large .folder-front::before {
            content: '';
            position: absolute;
            top: 8px;
            right: 12px;
            width: 24px;
            height: 18px;
            background: #e508ff;
            clip-path: polygon(85% 0, 100% 12%, 100% 100%, 85% 100%, 80% 75%, 60% 75%, 55% 100%, 45% 100%, 45% 75%, 35% 75%, 30% 100%, 20% 100%, 20% 75%, 10% 75%, 10% 50%, 0 50%, 0 25%, 10% 25%, 10% 0, 20% 0, 20% 25%, 30% 25%, 30% 50%, 40% 50%, 40% 100%, 50% 100%, 50% 50%, 60% 50%, 60% 25%, 70% 25%, 70% 50%, 80% 50%, 80% 25%, 85% 25%);
            opacity: 0.8;
        }

        .layer1-large .folder-label {
            font-size: 0.9rem;
            color: #1f2049;
        }

/* Layer_1 Small - Button style */
        .layer1-small {
            width: 195px;
            height: 41px;
        }

        .layer1-small .folder-front {
            height: 41px;
            border-radius: 16px;
            padding: 10px 20px;
            justify-content: center;
            background: linear-gradient(135deg, #f8f6f3 0%, #e9dcd2 100%);
            border: 1px solid #e508ff;
        }

        .layer1-small .folder-label {
            font-size: 0.85rem;
            text-align: center;
            color: #1f2049;
            font-weight: 800;
        }

        .folder-container:hover .layer1-small .folder-front {
            background: linear-gradient(160deg, #2a2c31 0%, #242529 40%, var(--accent-teal) 100%);
            border-color: var(--accent-teal);
        }

        .folder-container:hover .layer1-small .folder-label {
            color: #f0f0f0;
        }

        .layer1-small .folder-front {
            height: 41px;
            border-radius: 16px;
            padding: 10px 20px;
            justify-content: center;
        }

        .layer1-small .folder-label {
            font-size: 0.85rem;
            text-align: center;
        }

        .layer1-small .folder-meta {
            display: none;
        }

        .folder-container:hover .layer1-small .folder-front {
            background: linear-gradient(160deg, #2a2c31 0%, #242529 40%, var(--accent-teal) 100%);
            border-color: var(--accent-teal);
        }

        /* Pretext-optimized Content Preview */
        .content-peek {
            position: absolute;
            top: 20px;
            left: 15px;
            right: 15px;
            height: 100px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-peek {
            background: transparent;
            border: none;
        }

        .peek-logo {
            width: 100%;
            height: auto;
            max-height: 80px;
            object-fit: contain;
        }

        .folder-container:hover .content-peek {
            opacity: 1;
            transform: translateY(0);
        }

        .peek-line {
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 6px;
            width: 100%;
        }

        /* SVG Grain Filter */
        .svg-filter-hidden {
            position: absolute;
            width: 0;
            height: 0;
            visibility: hidden;
        }

        .strata-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 50% 50%, rgba(30, 31, 35, 0.8) 0%, rgba(10, 10, 11, 1) 100%),
                repeating-linear-gradient(45deg, transparent 0, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
            z-index: 1;
        }

        /* Header Section */
        .header-section {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo-img {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        .logo:hover .logo-img {
            opacity: 0.85;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 48px;
        }

        .nav-main, .nav-secondary {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-main .nav-link {
            font-family: 'Youth', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #f8f6f3;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 8px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-main .nav-link::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-purple);
            transition: width 0.3s ease;
        }

        .nav-secondary .nav-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #666666;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 8px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #f8f6f3;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Negative space branding */
        .header-slug {
            display: none;
        }

        .coordinates {
            position: fixed;
            bottom: 40px;
            right: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 400;
            line-height: 18px;
            color: #444444;
            text-align: right;
            letter-spacing: 0.02em;
        }

    </style>
</head>
<body>

    <svg class="svg-filter-hidden">
        <filter id="basalt-grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
            <feComponentTransfer>
                <feFuncR type="linear" slope="0.2" />
                <feFuncG type="linear" slope="0.2" />
                <feFuncB type="linear" slope="0.2" />
            </feComponentTransfer>
        </filter>
    </svg>

    <div class="basalt-surface" style="filter: url(#basalt-grain);"></div>
    <div class="strata-bg"></div>

    <!-- Header Section with Logo and Navigation -->
    <header class="header-section">
        <a href="/" class="logo-link">
            <img src="logo.svg" alt="Spitehouse" class="logo-img">
        </a>
        <nav class="nav">
            <div class="nav-main">
                <a href="#" class="nav-link">Projects</a>
                <a href="#" class="nav-link">Studio</a>
                <a href="#" class="nav-link">Agency</a>
            </div>
            <div class="nav-secondary">
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Contact</a>
                <a href="#" class="nav-link">Join</a>
            </div>
        </nav>
    </header>

    <main class="workspace">
        
        <!-- Folder 1 -->
        <div class="folder-container" style="transition-delay: 0.1s;">
            <div class="folder-tab"></div>
            <div class="folder-back">
                <div class="content-peek logo-peek">
                    <img src="gyf-logo.png" alt="logo" class="peek-logo">
                </div>
            </div>
            <div class="folder-front">
                <img src="gyf-logo.png" alt="GYF" class="folder-label-img">
                <div class="folder-meta">Layer 01 // 1.2GB</div>
            </div>
        </div>

        <!-- Folder 2 -->
        <div class="folder-container" style="transition-delay: 0.2s;">
            <div class="folder-tab"></div>
            <div class="folder-back">
                <div class="content-peek">
                    <div class="peek-line" style="width: 90%"></div>
                    <div class="peek-line" style="width: 30%"></div>
                    <div class="peek-line" style="width: 50%"></div>
                </div>
            </div>
            <div class="folder-front">
                <div class="folder-label">Lithic_Data</div>
                <div class="folder-meta">Layer 02 // 844MB</div>
            </div>
        </div>

        <!-- Folder 3 -->
        <div class="folder-container" style="transition-delay: 0.3s;">
            <div class="folder-tab"></div>
            <div class="folder-back">
                <div class="content-peek">
                    <div class="peek-line" style="width: 20%"></div>
                    <div class="peek-line" style="width: 70%"></div>
                    <div class="peek-line" style="width: 40%"></div>
                </div>
            </div>
            <div class="folder-front">
                <div class="folder-label">Tectonic_Ref</div>
                <div class="folder-meta">Layer 03 // 4.1GB</div>
            </div>
        </div>

    </main>

    <div class="coordinates">
        LAT: 64.1265° N<br>
        LNG: 21.8174° W
    </div>

    <script>
        // Subtle mouse interaction to shift the perspective grid
        const workspace = document.querySelector('.workspace');
        
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            workspace.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // Entrance animation
        document.querySelectorAll('.folder-container').forEach((el, i) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(40px) scale(0.9)';
            
            setTimeout(() => {
                el.style.transition = 'all 0.8s cubic-bezier(0.2, 0, 0.2, 1)';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0) scale(1)';
            }, 200 + (i * 150));
        });
    </script>
</body>
</html>
